version: '3.7'

services:
  cuida:
    container_name: cuida-dev
    build:
      context: .
      dockerfile: .docker/Dockerfile
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    command: ["npm", "run", "docs:dev", "--", "--host", "0.0.0.0"]
